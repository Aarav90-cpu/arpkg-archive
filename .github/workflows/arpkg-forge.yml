name: ARK OS Package Forge

# Only trigger when a PR is merged into main
on:
  push:
    branches:
      - main
    paths:
      - 'core/**/ARKBUILD'
      - 'community/**/ARKBUILD'

permissions:
  contents: write

jobs:
  build-and-sign:
    name: Compile, Hash, and Release
    runs-on: ubuntu-latest
    container: 
      image: alpine:latest
      options: --privileged # Required to manipulate network namespaces

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Native musl Build Tools
        run: |
          apk update
          # Install util-linux for the 'unshare' command
          apk add --no-cache bash build-base wget tar coreutils jq git util-linux autoconf automake libtool

      - name: Forge Packages and Generate Hashes
        run: |
          # Configure Git for the automated bot
          git config --global user.name "ARK-OS Forge Bot"
          git config --global user.email "forge-bot@ark-os.local"
          git config --global --add safe.directory /__w/arpkg-archive/arpkg-archive

          # Find all modified ARKBUILD files in the latest commit
          CHANGED_FILES=$(git diff-tree --no-commit-id --name-only -r HEAD | grep 'ARKBUILD$' || true)

          if [ -z "$CHANGED_FILES" ]; then
            echo "No ARKBUILD files modified. Exiting gracefully."
            exit 0
          fi

          for BUILD_FILE in $CHANGED_FILES; do
            echo "=> Processing $BUILD_FILE"
            PKG_DIR=$(dirname "$BUILD_FILE")
            CATEGORY=$(echo "$PKG_DIR" | cut -d'/' -f1) 
            
            source "$BUILD_FILE"
            
            BUILD_DIR="/tmp/build-$PKG_NAME"
            PKG_ROOT="/tmp/pkg-$PKG_NAME"
            mkdir -p "$BUILD_DIR" "$PKG_ROOT"
            
            cd "$BUILD_DIR"
            
            echo "=> Phase 1: Fetching source code (Network ON)"
            fetch
            
            echo "=> Phase 2: Compiling natively (Network OFF)"
            # Execute the compile function inside an isolated, network-less namespace
            # If the build script tries to download a secondary payload, it will instantly fail.
            export PKG_ROOT
            unshare --net -- bash -c "source $GITHUB_WORKSPACE/$BUILD_FILE && compile"
            
            echo "=> Phase 3: Packaging and Hashing"
            cp "$GITHUB_WORKSPACE/$PKG_DIR/pkginfo.json" "$PKG_ROOT/pkginfo.json"
            
            cd "$PKG_ROOT"
            FINAL_ARCHIVE="$PKG_NAME-$PKG_VERSION.tar.gz"
            tar -czf "$GITHUB_WORKSPACE/$PKG_DIR/$FINAL_ARCHIVE" .
            
            cd "$GITHUB_WORKSPACE/$PKG_DIR"
            HASH=$(sha256sum "$FINAL_ARCHIVE" | awk '{print $1}')
            echo "$HASH" > "$PKG_NAME.sha256"
            
            echo "=> Successfully forged $FINAL_ARCHIVE with hash $HASH"
            
            # Update the appropriate repository index list
            LIST_FILE="$GITHUB_WORKSPACE/$CATEGORY/$CATEGORY.list"
            grep -v "^$PKG_NAME " "$LIST_FILE" > "$LIST_FILE.tmp" || true
            echo "$PKG_NAME $PKG_VERSION $HASH $DEPENDENCIES" >> "$LIST_FILE.tmp"
            mv "$LIST_FILE.tmp" "$LIST_FILE"
            
            git add "$FINAL_ARCHIVE" "$PKG_NAME.sha256" "$CATEGORY/$CATEGORY.list"
          done

          git commit -m "Forge Bot: Automated build and cryptographic signing" || echo "Nothing to commit"
          git push
